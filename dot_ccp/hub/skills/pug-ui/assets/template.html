<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Title</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5/daisyui.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://gnjo.github.io/pug/pug.js"></script>
</head>
<body>
  <div id="app"></div>

  <script type="text/pug" id="pug-src">
//- ============================================
//- Replace this block with your Pug content
//- ============================================

.min-h-screen.bg-base-200
  .navbar.bg-base-100.shadow-sm
    .navbar-center
      a.btn.btn-ghost.text-xl Page Title

  .container.mx-auto.p-8.max-w-5xl

    //- Hero section
    .hero.bg-base-100.rounded-box.mb-8.shadow
      .hero-content.text-center.py-12
        .max-w-3xl
          h1.text-4xl.font-bold.mb-4 Your Heading
          p.text-lg.opacity-70 Your description goes here.

    //- Content cards
    .grid.gap-4.mb-8(class="md:grid-cols-2")
      .card.bg-base-100.shadow
        .card-body
          h2.card-title Section One
          p Card content here
      .card.bg-base-100.shadow
        .card-body
          h2.card-title Section Two
          p Card content here

    //- Data table
    .card.bg-base-100.shadow.mb-8
      .card-body
        h2.card-title.text-2xl Data Table
        .overflow-x-auto.mt-4
          table.table.table-zebra
            thead
              tr
                th Column A
                th Column B
                th Column C
            tbody
              tr
                td Value 1
                td Value 2
                td Value 3

    //- Footer
    .divider
    footer.text-center.pb-8.opacity-50
      p.text-sm Generated with Pug + daisyUI + Tailwind CDN
  </script>

  <script>
    try {
      const src = document.getElementById('pug-src').textContent;
      document.getElementById('app').innerHTML = pug.render(src, {
        filename: 'template.pug',
        basedir: '.'
      });
    } catch (e) {
      document.getElementById('app').innerHTML =
        '<div class="alert alert-error m-8"><pre>' +
        e.message + '</pre></div>' +
        '<pre class="m-8 p-4 bg-base-300 rounded overflow-auto text-xs">' +
        document.getElementById('pug-src').textContent + '</pre>';
    }
  </script>
</body>
</html>
