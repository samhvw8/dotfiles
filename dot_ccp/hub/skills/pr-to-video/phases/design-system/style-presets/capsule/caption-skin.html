<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Capsule — Captions</title>
    <!--
      Capsule caption skin (preset-local source — see phases/design-system/README.md §3.5).

      Pre-baked, brand-token-strict caption sub-composition. emit-chunks copies this to
      design-system/chunks/caption-skin.html for the chosen preset; build-captions-html.mjs
      fills three reserved holes and writes compositions/captions.html:
        - the empty GROUPS array       → engine's scene-aware, non-overlapping word groups
        - the 0 DURATION + data-duration → real total_duration_s
        - the empty brand-tokens style → the project's tokens.css (incl. @font-face)
      (the filler asserts each hole appears exactly once, so this note avoids the literals)

      Contract (identical across every preset's skin):
        · root data-composition-id="captions"; timeline registers window.__timelines["captions"]
        · canonical hooks .caption-group / .caption-word (+ states .is-active / .is-spoken)
        · groups are position:absolute and OVERLAP — exactly one shown at a time (opacity)
        · all colors var(--*) / color-mix over tokens — brand-strict (no bare hex)
        · no <video>, no Google Fonts, no placeholder transcript, no window.<native>()
        · state via gsap.set({className}) (seek-safe on frame-by-frame seek) — NOT .call callbacks

      Visual: Capsule's universal-pill — a fully-rounded, ink-outlined pill with a soft
      low-opacity offset shadow; the current word gets a rounded candy highlight
      (var(--brand-primary)); Space Grotesk, uppercase, pill tracking.
    -->
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>

    <!-- build-captions-html.mjs injects the project's tokens.css here -->
    <style data-brand-tokens></style>

    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      html,
      body {
        width: 1920px;
        height: 1080px;
        margin: 0;
        overflow: hidden;
        background: transparent;
      }
      #captions-root {
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: transparent;
        pointer-events: none;
      }

      /* capsule · captions · fully-rounded pill, ink outline, soft offset shadow, candy active */
      .caption-layer {
        position: absolute;
        inset: 0;
        z-index: 20;
        pointer-events: none;
      }
      .caption-stage {
        position: absolute;
        left: 50%;
        bottom: 24px;
        transform: translateX(-50%);
        width: 1600px;
        height: 200px;
      }
      .caption-group {
        /* every group is absolutely positioned over the SAME band — exactly one is shown
           at a time via opacity. Must be absolute: in-flow groups lay out side-by-side. */
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
      }

      /* THE capsule — fully-rounded pill, 2px ink outline, soft low-opacity offset shadow */
      .caption-pill {
        max-width: 1600px;
        padding: 0.8rem 2.4rem;
        background: var(--canvas);
        border: var(--cap-outline-w, 2px) solid var(--ink);
        border-radius: var(--cap-radius-pill, 9999px);
        box-shadow: var(--cap-shadow-md, 6px 6px 0 color-mix(in srgb, var(--ink) 8%, transparent));
      }
      .caption-line {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 0.1em 0.42em;
        font-family: var(--font-body);
        font-weight: 600;
        font-size: clamp(40px, 4.2vw, 54px);
        line-height: 1.24;
        letter-spacing: var(--cap-track-pill, 0.12em);
        text-transform: uppercase;
      }

      /* upcoming — faint ink */
      .caption-word {
        display: inline-block;
        color: color-mix(in srgb, var(--ink) 38%, var(--canvas));
      }
      /* current word — rounded candy highlight. box-shadow spread = rounded halo (it
         follows border-radius) with NO layout shift when the class toggles. */
      .caption-word.is-active {
        color: var(--ink);
        background: var(--brand-primary);
        border-radius: var(--cap-radius-pill, 9999px);
        box-shadow: 0 0 0 0.16em var(--brand-primary);
      }
      /* already spoken — solid ink, candy cleared */
      .caption-word.is-spoken {
        color: var(--ink);
        background: transparent;
        box-shadow: none;
      }

      /* optional per-word accents (dormant until a word-classer tags them) */
      .caption-word.cap-brand {
        color: var(--brand-secondary);
      }
      .caption-word.cap-brand.is-active {
        color: var(--ink);
        background: var(--brand-secondary);
        box-shadow: 0 0 0 0.16em var(--brand-secondary);
      }
      .caption-word.cap-num {
        color: color-mix(in srgb, var(--ink) 72%, var(--canvas));
      }
      .caption-word.cap-cta {
        text-decoration: underline;
        text-decoration-thickness: 4px;
        text-decoration-color: var(--brand-primary);
        text-underline-offset: 0.12em;
      }

      @media (max-aspect-ratio: 9/16) {
        .caption-stage {
          bottom: 100px;
          width: 92%;
        }
        .caption-line {
          font-size: clamp(34px, 5.2vw, 46px);
        }
      }
    </style>
  </head>
  <body>
    <div
      id="captions-root"
      data-composition-id="captions"
      data-timeline-locked
      data-start="0"
      data-duration="0"
      data-fps="30"
      data-width="1920"
      data-height="1080"
    >
      <div class="caption-layer" aria-hidden="true">
        <div id="caption-stage" class="caption-stage"></div>
      </div>
    </div>

    <script>
      // build-captions-html.mjs injects the engine's scene-aware groups + real duration.
      var GROUPS = [];
      var DURATION = 0;

      (function () {
        var stage = document.getElementById("caption-stage");

        // build DOM: one .caption-group per group, .caption-word per word
        GROUPS.forEach(function (group, g) {
          var groupEl = document.createElement("div");
          groupEl.className = "caption-group";
          groupEl.id = "caption-group-" + g;
          var pill = document.createElement("div");
          pill.className = "caption-pill";
          var line = document.createElement("div");
          line.className = "caption-line";
          (group.words || []).forEach(function (w, i) {
            var span = document.createElement("span");
            span.className = "caption-word";
            span.id = "caption-word-" + g + "-" + i;
            span.textContent = String(w.text).toUpperCase();
            line.appendChild(span);
          });
          pill.appendChild(line);
          groupEl.appendChild(pill);
          stage.appendChild(groupEl);
        });

        window.__timelines = window.__timelines || {};
        var tl = gsap.timeline({ paused: true });

        GROUPS.forEach(function (group, g) {
          var groupEl = document.getElementById("caption-group-" + g);
          var words = group.words || [];
          var next = GROUPS[g + 1];
          var isLast = g === GROUPS.length - 1;
          var start = Math.max(0, Number(group.start));
          var end = isLast ? DURATION : Math.min(Number(next.start), Number(group.end) + 0.3);
          if (end <= start) end = start + 0.01;

          // group on/off — exactly one group visible at a time
          tl.set(groupEl, { opacity: 1 }, start);
          tl.set(groupEl, { opacity: 0 }, end);

          // 3-state karaoke via className SETS — seek-safe (gsap.set applies on the
          // engine's frame-by-frame seek; .call callbacks would NOT fire).
          words.forEach(function (w, i) {
            var el = document.getElementById("caption-word-" + g + "-" + i);
            var at = Math.max(start, Number(w.start));
            tl.set(el, { className: "caption-word" }, start); // upcoming (also resets on reverse-seek)
            tl.set(el, { className: "caption-word is-active" }, at); // current
            tl.fromTo(el, { scale: 0.9 }, { scale: 1, duration: 0.14, ease: "back.out(2.6)" }, at);
            if (i + 1 < words.length) {
              var nextAt = Math.max(start, Number(words[i + 1].start));
              tl.set(el, { className: "caption-word is-spoken" }, nextAt); // demote when next stamps
            }
          });
          if (words.length) {
            var lastEl = document.getElementById("caption-word-" + g + "-" + (words.length - 1));
            var lastSpoken = Math.min(end, Number(words[words.length - 1].end) + 0.1);
            tl.set(lastEl, { className: "caption-word is-spoken" }, lastSpoken);
          }
        });

        // full-span anchor so the sub-comp timeline spans the whole video
        tl.to({}, { duration: DURATION }, 0);
        window.__timelines["captions"] = tl;
      })();
    </script>
  </body>
</html>
