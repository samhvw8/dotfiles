[settings]
experimental = true
legacy_version_file_disable_tools = ['java']
idiomatic_version_file_enable_tools = ["node"]

[settings.npm]
package_manager = "aube"

[settings.pipx]
uvx = true

[settings.cargo]
binstall = true

[tools]
chezmoi = "latest"
direnv = "latest"
go = "1.25.1"
jq = "latest"
k6 = "latest"
node = "22"
python = "3.11"
ripgrep = "latest"
rust = "latest"
zig = "0.11.0"
shellcheck = "latest"
shfmt = "latest"
uv = "latest"
yt-dlp = { version = "latest", rename_exe = "yt-dlp" }
yq = "latest"
neovim = "0.11.4"
lazygit = "latest"
dasel = "latest"
hurl = "latest"
rg = "latest"
cloudflared = "latest"
ast-grep = "latest"
starship = "latest"
zoxide = "latest"
delta = "latest"
usage = "latest"
"forgejo:mergiraf/mergiraf" = "latest"
bun = "latest"
jnv = "latest"
"github:asyrjasalo/dynamic-mcp" = "latest"
"github:memextech/ht-mcp" = "latest"
"npm:mcp-chrome-bridge" = "latest"
rclone = "latest"
git-lfs = "latest"
kubectl = "latest"
k9s = "latest"
"github:bettercap/bettercap" = "latest"
pnpm = "latest"
"github:samhvw8/claude-code-profile" = { version = "latest", minimum_release_age = "0s" }
"npm:playwriter" = "latest"
vhs = "latest"
zellij = "latest"
"github:pinchtab/pinchtab" = "latest"
wrangler = "latest"
"pipx:it2" = "latest"
"npm:cf" = "latest"
claude = { version = "latest", minimum_release_age = "0s" }
gcloud = "latest"
"pipx:code-review-graph" = "latest"
aube = "latest"
flyctl = "latest"
firebase = "15.17.0"
"npm:@agentmemory/agentmemory" = "latest"
"github:iii-hq/iii" = "iii/v0.11.2"
opengrep = "latest"
"github:Ataraxy-Labs/weave" = { version = "latest", matching = "weave-cli", exe = "weave" }
"http:weave-driver" = { version = "v0.3.6", url = "https://github.com/Ataraxy-Labs/weave/releases/download/{{ version }}/weave-driver-{{ arch(arm64=\"aarch64\", x64=\"x86_64\") }}-{{ os(macos=\"apple-darwin\", linux=\"unknown-linux-gnu\") }}.tar.gz", exe = "weave-driver" }
"http:weave-mcp" = { version = "v0.3.6", url = "https://github.com/Ataraxy-Labs/weave/releases/download/{{ version }}/weave-mcp-{{ arch(arm64=\"aarch64\", x64=\"x86_64\") }}-{{ os(macos=\"apple-darwin\", linux=\"unknown-linux-gnu\") }}.tar.gz", exe = "weave-mcp" }
"github:DeusData/codebase-memory-mcp" = "latest"
"npm:impeccable" = "latest"
"github:colbymchenry/codegraph" = { version = "latest", minimum_release_age = "0s" }
"github:Ataraxy-Labs/sem" = { version = "latest", minimum_release_age = "0s" }
